services:
  postgres:
    image: postgres:16
    container_name: ddd-benefits-postgres
    environment:
      POSTGRES_DB: benefits
      POSTGRES_USER: benefits
      POSTGRES_PASSWORD: benefits
    ports:
      - "127.0.0.1:5434:5432"  # host:5434 → container:5432; avoids conflict with other local Postgres (D-09)
    volumes:
      - benefits_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benefits -d benefits"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  benefits_data:
